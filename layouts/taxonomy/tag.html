{{ define "content" }}
<h1 class="title">
  tags [{{ .Title }}]
</h1>
<ul>
  {{ range .Pages }}
  <li>{{ .Date.Format "2006-01-02" }}: <a href="{{ .Permalink }}">{{ .Title }}</a></li>
  {{ end }}
</ul>

<div class="blog-links">
  <a href="/tags/">back to tags</a>
  <a href="/blog/">all posts</a>
</div>
{{ end }}
